# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
java = "21"
springBoot = "3.5.13"
dependencyManagement = "1.1.7"
lombok = "8.6"
jupiter = "5.11.1"
commonsText = "1.12.0"
redisson = "3.41.0"
kafka = "3.3.14"
resilience4j = "2.2.0"


[libraries]
spring-boot-starter = { module = "org.springframework.boot:spring-boot-starter", version.ref = "springBoot" }
spring-boot-starter-web = { module = "org.springframework.boot:spring-boot-starter-web", version.ref = "springBoot" }
spring-boot-starter-aop = { module = "org.springframework.boot:spring-boot-starter-aop", version.ref = "springBoot" }
spring-boot-starter-actuator = { module = "org.springframework.boot:spring-boot-starter-actuator", version.ref = "springBoot" }
spring-boot-starter-data-jpa = { module = "org.springframework.boot:spring-boot-starter-data-jpa", version.ref = "springBoot" }
spring-boot-starter-data-redis = { module = "org.springframework.boot:spring-boot-starter-data-redis", version.ref = "springBoot" }
spring-boot-starter-test = { module = "org.springframework.boot:spring-boot-starter-test", version.ref = "springBoot" }
jackson-databind = { module = "com.fasterxml.jackson.core:jackson-databind" }
commons-text = { module = "org.apache.commons:commons-text", version.ref = "commonsText" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "jupiter" }
redisson = { module = "org.redisson:redisson-spring-boot-starter", version.ref = "redisson" }
resilience4j = { module = "io.github.resilience4j:resilience4j-spring-boot3", version.ref = "resilience4j" }
spring-kafka = { module = "org.springframework.kafka:spring-kafka", version.ref = "kafka"}
spring-kafka-test = { module = "org.springframework.kafka:spring-kafka-test"}
caffeine = { module = "com.github.ben-manes.caffeine:caffeine"}
postgresql = { module = "org.postgresql:postgresql"}
micrometer-registry-prometheus = {module = "io.micrometer:micrometer-registry-prometheus"}

[plugins]
springBoot = { id = "org.springframework.boot", version.ref = "springBoot" }
dependencyManagement = { id = "io.spring.dependency-management", version.ref = "dependencyManagement" }
lombok = { id = "io.freefair.lombok", version.ref = "lombok" }
