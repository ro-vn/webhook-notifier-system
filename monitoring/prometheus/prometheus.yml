global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'webhook-worker'
    metrics_path: '/actuator/prometheus'
    dns_sd_configs:
      - names:
          - 'webhook-worker'
        type: 'A'
        port: 8080

  - job_name: 'publisher'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['publisher:8080']

  - job_name: 'receiver'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['receiver:8081']

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']
