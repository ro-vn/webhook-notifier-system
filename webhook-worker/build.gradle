/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'buildlogic.spring-web-conventions'
    id 'buildlogic.lombok-conventions'
}

dependencies {
    implementation libs.spring.boot.starter.aop
    implementation libs.spring.boot.starter.data.redis
    implementation libs.redisson
    implementation libs.spring.kafka
    implementation libs.caffeine

    implementation libs.postgresql
    implementation libs.spring.boot.starter.actuator

    runtimeOnly libs.micrometer.registry.prometheus
    testImplementation libs.spring.kafka.test
}

application {
    mainClass = 'com.rnvo.notifier.WebhookWorkerApplication'
}

tasks.named('bootRun') {
    // Logs "PinnedThreadsDump" to stdout whenever a virtual thread pins a carrier.
    // Only for local dev — remove or set to 'short' in production.
    jvmArgs '-Djdk.tracePinnedThreads=full'
}
