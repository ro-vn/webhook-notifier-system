/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    // Support convention plugins written in Groovy. Convention plugins are build scripts in 'src/main' that automatically become available as plugins in the main build.
    id 'groovy-gradle-plugin'
}

repositories {
    // Use the plugin portal to apply community plugins in convention plugins.
    gradlePluginPortal()
    mavenCentral()
}

// Load properties from root project
def rootProperties = new Properties()
file("../gradle.properties").withInputStream { rootProperties.load(it) }

dependencies {
    implementation "org.springframework.boot:spring-boot-gradle-plugin:${rootProperties.springBootVersion}"
    implementation "io.spring.dependency-management:io.spring.dependency-management.gradle.plugin:${rootProperties.dependencyManagementVersion}"
    implementation "io.freefair.lombok:io.freefair.lombok.gradle.plugin:${rootProperties.lombokVersion}"
}